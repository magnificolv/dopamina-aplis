<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="#0a0a1a"/>

  <!-- Dopamine wheel segments -->
  <!-- Red segment (0-51.4°) -->
  <path d="M 256 256 L 256 76 A 180 180 0 0 1 362.72 88.28 Z" fill="#ff4444" opacity="0.9"/>

  <!-- Orange segment (51.4-102.8°) -->
  <path d="M 256 256 L 362.72 88.28 A 180 180 0 0 1 423.72 256 Z" fill="#ff9944" opacity="0.9"/>

  <!-- Yellow segment (102.8-154.2°) -->
  <path d="M 256 256 L 423.72 256 A 180 180 0 0 1 362.72 423.72 Z" fill="#ffdd44" opacity="0.9"/>

  <!-- Green segment (154.2-205.6°) -->
  <path d="M 256 256 L 362.72 423.72 A 180 180 0 0 1 149.28 437.72 Z" fill="#44dd44" opacity="0.9"/>

  <!-- Cyan segment (205.6-257°) -->
  <path d="M 256 256 L 149.28 437.72 A 180 180 0 0 1 88.28 362.72 Z" fill="#44ddff" opacity="0.9"/>

  <!-- Blue segment (257-308.4°) -->
  <path d="M 256 256 L 88.28 362.72 A 180 180 0 0 1 87.72 149.28 Z" fill="#4444ff" opacity="0.9"/>

  <!-- Purple segment (308.4-359.8°) -->
  <path d="M 256 256 L 87.72 149.28 A 180 180 0 0 1 256 76 Z" fill="#dd44ff" opacity="0.9"/>

  <!-- Center circle (brain area) -->
  <circle cx="256" cy="256" r="85" fill="#1a1a2e"/>

  <!-- Brain emoji/stylized brain shape -->
  <g transform="translate(256, 256)">
    <!-- Simple brain outline with lobes -->
    <!-- Left lobe -->
    <ellipse cx="-26" cy="-13" rx="22" ry="32" fill="#ffcc44" opacity="0.85"/>
    <!-- Right lobe -->
    <ellipse cx="26" cy="-13" rx="22" ry="32" fill="#ffcc44" opacity="0.85"/>
    <!-- Bottom center -->
    <ellipse cx="0" cy="26" rx="16" ry="22" fill="#ffcc44" opacity="0.85"/>

    <!-- Brain surface details (simple grooves) -->
    <path d="M -22 -20 Q -13 0 -22 22" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 0 -26 Q 0 12 0 32" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 22 -20 Q 13 0 22 22" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Inner ring accent -->
  <circle cx="256" cy="256" r="85" fill="none" stroke="#ff6699" stroke-width="2" opacity="0.4"/>
</svg>