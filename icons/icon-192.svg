<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="192" height="192" rx="45" fill="#0a0a1a"/>

  <!-- Dopamine wheel segments -->
  <!-- Red segment (0-51.4°) -->
  <path d="M 96 96 L 96 26 A 70 70 0 0 1 136.02 31.98 Z" fill="#ff4444" opacity="0.9"/>

  <!-- Orange segment (51.4-102.8°) -->
  <path d="M 96 96 L 136.02 31.98 A 70 70 0 0 1 160.02 96 Z" fill="#ff9944" opacity="0.9"/>

  <!-- Yellow segment (102.8-154.2°) -->
  <path d="M 96 96 L 160.02 96 A 70 70 0 0 1 136.02 160.02 Z" fill="#ffdd44" opacity="0.9"/>

  <!-- Green segment (154.2-205.6°) -->
  <path d="M 96 96 L 136.02 160.02 A 70 70 0 0 1 56 166 Z" fill="#44dd44" opacity="0.9"/>

  <!-- Cyan segment (205.6-257°) -->
  <path d="M 96 96 L 56 166 A 70 70 0 0 1 31.98 136.02 Z" fill="#44ddff" opacity="0.9"/>

  <!-- Blue segment (257-308.4°) -->
  <path d="M 96 96 L 31.98 136.02 A 70 70 0 0 1 32 56 Z" fill="#4444ff" opacity="0.9"/>

  <!-- Purple segment (308.4-359.8°) -->
  <path d="M 96 96 L 32 56 A 70 70 0 0 1 96 26 Z" fill="#dd44ff" opacity="0.9"/>

  <!-- Center circle (brain area) -->
  <circle cx="96" cy="96" r="32" fill="#1a1a2e"/>

  <!-- Brain emoji/stylized brain shape -->
  <g transform="translate(96, 96)">
    <!-- Simple brain outline with lobes -->
    <!-- Left lobe -->
    <ellipse cx="-10" cy="-5" rx="8" ry="12" fill="#ffcc44" opacity="0.85"/>
    <!-- Right lobe -->
    <ellipse cx="10" cy="-5" rx="8" ry="12" fill="#ffcc44" opacity="0.85"/>
    <!-- Bottom center -->
    <ellipse cx="0" cy="10" rx="6" ry="8" fill="#ffcc44" opacity="0.85"/>

    <!-- Brain surface details (simple grooves) -->
    <path d="M -8 -8 Q -5 0 -8 8" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 0 -10 Q 0 5 0 12" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 8 -8 Q 5 0 8 8" stroke="#ffaa00" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Inner ring accent -->
  <circle cx="96" cy="96" r="32" fill="none" stroke="#ff6699" stroke-width="1" opacity="0.4"/>
</svg>